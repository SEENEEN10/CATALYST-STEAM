<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" role="img" aria-labelledby="title desc">
  <title id="title">Catalyst Logo</title>
  <desc id="desc">Stylized Catalyst Save logo mark for website header.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#6a49e9" />
      <stop offset="55%" stop-color="#2a2f99" />
      <stop offset="100%" stop-color="#101738" />
    </radialGradient>
    <radialGradient id="orb" cx="50%" cy="48%" r="55%">
      <stop offset="0%" stop-color="#b571ff" />
      <stop offset="85%" stop-color="#6a33c8" />
      <stop offset="100%" stop-color="#4b1c98" />
    </radialGradient>
    <linearGradient id="bolt" x1="50%" y1="0%" x2="45%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#8dd0ff" />
    </linearGradient>
  </defs>
  <rect width="640" height="640" fill="url(#bg)" />
  <circle cx="320" cy="360" r="170" fill="url(#orb)" />
  <path d="M340 20 C345 120 350 160 334 230 C318 296 324 346 328 396" fill="none" stroke="url(#bolt)" stroke-width="22" stroke-linecap="round"/>
  <text x="70" y="165" font-family="Arial, sans-serif" font-size="72" font-weight="700" fill="#ffffff">CATALYST</text>
  <text x="192" y="455" font-family="Arial, sans-serif" font-size="96" font-weight="700" fill="#ffffff">$AVE</text>
</svg>
